services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=${FLASK_ENV:-development}
      - PORT=5000
      - HOST=0.0.0.0
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4}
      - OLLAMA_TIMEOUT_SECONDS=${OLLAMA_TIMEOUT_SECONDS:-120}
      - HISTORY_BACKEND_TYPE=${HISTORY_BACKEND_TYPE:-local}
      - HISTORY_DB_PATH=/app/data/chat_history.db
      - HISTORY_REDIS_URL=${HISTORY_REDIS_URL:-redis://redis:6379/0}
      - AUTH_ENABLED=${AUTH_ENABLED:-True}
      - AUTH_SECRET_KEY=${AUTH_SECRET_KEY:-}
      - AUTH_USERS_FILE=/app/data/users.json
      - WEB_SEARCH_ENABLED=${WEB_SEARCH_ENABLED:-True}
    volumes:
      - backend-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:5000}
      - VITE_API_TIMEOUT=${VITE_API_TIMEOUT:-30000}
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  backend-data:
  redis-data:
